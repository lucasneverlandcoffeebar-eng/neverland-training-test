<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neverland Coffee Bar — Employee Training</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--espresso:#2C1810;--roast:#4A2C1A;--caramel:#C8860A;--latte:#D4A96A;--cream:#F5ECD7;--foam:#FBF6EE;--milk:#fff;--err:#C0392B;--pass:#27AE60;--border:rgba(44,24,16,0.15);--shadow:0 2px 12px rgba(44,24,16,0.08)}
body{font-family:'Lato',sans-serif;background:var(--foam);color:var(--espresso);min-height:100vh}
.app{max-width:700px;margin:0 auto;padding:1rem;min-height:100vh}
.brand-header{text-align:center;padding:2rem 1rem 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.brand-logo{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--caramel);font-weight:700;margin-bottom:.5rem}
.brand-title{font-family:'Playfair Display',serif;font-size:clamp(18px,4vw,26px);font-weight:700;color:var(--espresso);line-height:1.2}
.brand-sub{font-size:13px;color:var(--roast);opacity:.7;margin-top:6px;letter-spacing:1px}
.card{background:var(--milk);border-radius:16px;border:1px solid var(--border);padding:1.5rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 24px;border-radius:10px;font-family:'Lato',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:transform .1s,opacity .1s;letter-spacing:.5px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--caramel);color:white}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--cream);color:var(--espresso);border:1px solid var(--border)}
.btn-secondary:hover{background:#EDE0C8}
.btn-danger{background:var(--err);color:white}
.btn-green{background:var(--pass);color:white}
.btn-full{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}
label{display:block;font-size:13px;font-weight:700;color:var(--roast);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
input[type="text"],input[type="password"],select,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--foam);font-family:'Lato',sans-serif;font-size:15px;color:var(--espresso);outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--caramel);background:var(--milk)}
textarea{resize:vertical;min-height:90px}
.progress-bar-wrap{background:var(--cream);border-radius:99px;height:7px;overflow:hidden;margin-bottom:6px}
.progress-bar-fill{height:100%;background:var(--caramel);border-radius:99px;transition:width .4s ease}
.progress-label{font-size:12px;color:var(--roast);opacity:.7;text-align:right}
.q-section-badge{display:inline-block;padding:3px 12px;border-radius:99px;background:var(--cream);color:var(--caramel);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem}
.q-number{font-size:12px;color:var(--roast);opacity:.6;margin-bottom:4px}
.q-text{font-family:'Playfair Display',serif;font-size:17px;color:var(--espresso);line-height:1.5;margin-bottom:1.25rem}
.q-scenario{background:var(--cream);border-left:3px solid var(--caramel);border-radius:0 8px 8px 0;padding:10px 14px;font-style:italic;font-size:15px;margin-bottom:1rem;color:var(--roast)}
.option-btn{display:block;width:100%;text-align:left;padding:12px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--foam);font-family:'Lato',sans-serif;font-size:14px;color:var(--espresso);cursor:pointer;transition:all .15s;margin-bottom:8px;line-height:1.4}
.option-btn:hover{border-color:var(--caramel);background:var(--cream)}
.option-btn.selected{border-color:var(--caramel);background:#FFF3DC;font-weight:700}
.option-btn.correct{border-color:var(--pass);background:#D5F5E3}
.option-btn.incorrect{border-color:var(--err);background:#FDECEA}
.option-letter{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--cream);color:var(--caramel);font-weight:700;font-size:12px;text-align:center;line-height:22px;margin-right:10px;flex-shrink:0}
.option-btn.selected .option-letter{background:var(--caramel);color:white}
.option-btn.correct .option-letter{background:var(--pass);color:white}
.option-btn.incorrect .option-letter{background:var(--err);color:white}
.match-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.match-item{font-weight:700;font-size:14px;min-width:160px}
.nav-row{display:flex;gap:10px;margin-top:1.5rem}
.nav-row .btn{flex:1}
.result-score{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;color:var(--espresso);text-align:center}
.result-pct{font-size:22px;color:var(--caramel);text-align:center;margin-bottom:8px}
.result-badge{display:inline-block;padding:6px 20px;border-radius:99px;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase}
.badge-pass{background:#D5F5E3;color:var(--pass)}
.badge-fail{background:#FDECEA;color:var(--err)}
.review-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}
.review-q{font-size:13px;flex:1}
.review-a{font-size:13px;max-width:200px;text-align:right}
.tag{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.tag-pass{background:#D5F5E3;color:var(--pass)}
.tag-fail{background:#FDECEA;color:var(--err)}
.tag-correct{background:#D5F5E3;color:var(--pass)}
.tag-incorrect{background:#FDECEA;color:var(--err)}
.tag-review{background:#FFF3CD;color:#856404}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--cream);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--espresso)}
.stat-lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--roast);opacity:.7;margin-top:2px}
.section-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:1rem;color:var(--espresso)}
.section-sub{font-size:13px;color:var(--roast);opacity:.8;margin-bottom:1.5rem;line-height:1.6}
.search-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.search-row input{flex:1;min-width:140px}
.search-row select{width:140px}
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{background:var(--cream);padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--roast);border-bottom:1px solid var(--border)}
.admin-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.admin-table tr:hover td{background:var(--foam)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.detail-cell{background:var(--foam);border-radius:8px;padding:10px}
.detail-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--roast);opacity:.7;margin-bottom:2px}
.detail-val{font-size:14px;font-weight:700;color:var(--espresso)}
.q-detail-row{padding:10px 0;border-bottom:1px solid var(--border)}
.q-detail-text{font-size:13px;color:var(--espresso);margin-bottom:4px}
.q-detail-sa{background:var(--foam);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--espresso);margin:6px 0;font-style:italic;line-height:1.5}
.override-row{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.override-row select{width:auto;padding:6px 10px;font-size:13px}
/* Home screen menu buttons */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:1.5rem}
.home-btn{background:var(--milk);border:1.5px solid var(--border);border-radius:14px;padding:1.25rem 1rem;cursor:pointer;text-align:center;transition:all .15s;box-shadow:var(--shadow)}
.home-btn:hover{border-color:var(--caramel);background:var(--cream);transform:translateY(-2px)}
.home-btn-icon{font-size:28px;margin-bottom:8px}
.home-btn-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--espresso);margin-bottom:4px}
.home-btn-sub{font-size:12px;color:var(--roast);opacity:.7}
/* Study center */
.study-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem}
.study-nav-btn{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--foam);color:var(--roast);transition:all .15s}
.study-nav-btn.active{background:var(--caramel);color:white;border-color:var(--caramel)}
.study-nav-btn:hover{border-color:var(--caramel)}
.study-section{margin-bottom:1.5rem}
.study-section h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--espresso);margin-bottom:0.75rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem}
.study-section p{font-size:14px;color:var(--roast);line-height:1.7;margin-bottom:0.75rem}
.study-section ul{padding-left:1.25rem;margin-bottom:0.75rem}
.study-section li{font-size:14px;color:var(--roast);line-height:1.8}
.study-callout{background:var(--cream);border-left:3px solid var(--caramel);border-radius:0 8px 8px 0;padding:12px 16px;margin:1rem 0;font-size:14px;color:var(--espresso);line-height:1.6;font-style:italic}
.menu-category{background:var(--foam);border-radius:12px;border:1px solid var(--border);padding:1rem;margin-bottom:10px}
.menu-category-title{font-weight:700;font-size:14px;color:var(--espresso);margin-bottom:6px}
.menu-category-desc{font-size:13px;color:var(--roast);margin-bottom:8px;line-height:1.5}
.menu-items{display:flex;flex-wrap:wrap;gap:5px}
.menu-tag{background:var(--cream);border-radius:99px;padding:3px 10px;font-size:12px;color:var(--roast);font-weight:700}
/* Flashcards */
.flashcard-wrap{perspective:1000px;width:100%;margin-bottom:1rem}
.flashcard{width:100%;min-height:160px;border-radius:16px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .5s;box-shadow:var(--shadow)}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;width:100%;min-height:160px;border-radius:16px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center}
.flashcard-front{background:var(--milk);border:1.5px solid var(--border)}
.flashcard-back{background:var(--caramel);color:white;transform:rotateY(180deg)}
.flashcard-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;opacity:.6;margin-bottom:8px}
.flashcard-text{font-family:'Playfair Display',serif;font-size:16px;line-height:1.5;font-weight:600}
.flashcard-back .flashcard-label{color:rgba(255,255,255,0.7)}
.flashcard-back .flashcard-text{color:white}
.fc-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:1rem}
.fc-counter{font-size:13px;color:var(--roast);opacity:.7}
/* Practice */
.practice-result{border-radius:10px;padding:12px 16px;margin-top:12px;font-size:14px;line-height:1.5}
.practice-correct{background:#D5F5E3;color:var(--pass);border:1px solid #A9DFBF}
.practice-incorrect{background:#FDECEA;color:var(--err);border:1px solid #F5B7B1}
/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(44,24,16,0.5);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
.modal-box{background:var(--milk);border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(44,24,16,0.2);margin:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--milk);z-index:1}
.modal-body{padding:1.5rem}
.modal-close{background:var(--cream);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--espresso)}
/* Rec cards */
.rec-group{margin-bottom:1.25rem}
.rec-group-title{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--caramel);margin-bottom:8px}
.rec-items{display:flex;flex-wrap:wrap;gap:6px}
.rec-item{background:var(--cream);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--espresso);font-weight:600}
/* Admin notes */
.notes-area{width:100%;min-height:70px;font-size:13px;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:var(--foam);font-family:'Lato',sans-serif;resize:vertical}
/* Loading / empty states */
.state-box{text-align:center;padding:2.5rem 1rem;color:var(--roast)}
.state-icon{font-size:36px;margin-bottom:12px}
.state-text{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--espresso)}
.state-sub{font-size:13px;opacity:.7}
@media(max-width:480px){
  .detail-grid{grid-template-columns:1fr}
  .match-row{flex-direction:column;align-items:stretch}
  .match-item{min-width:unset}
  .admin-table{display:block;overflow-x:auto}
  .nav-row{flex-direction:column}
  .search-row select{width:100%}
  .home-grid{grid-template-columns:1fr}
  .stat-row{grid-template-columns:repeat(3,1fr);gap:6px}
  .stat-num{font-size:22px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ── CONFIG ───────────────────────────────────────────────────────────────────

// ── DATA: OFFICIAL TEST ──────────────────────────────────────────────────────
const MC_Q = [
  {id:1,question:"What egg styles can customers choose from?",options:["Sunny side up, scrambled, over medium, boiled, or egg whites","Sunny side up, scrambled, over easy, over medium, hard fried, boiled, or egg whites","Sunny side up, over easy, poached, boiled, or egg whites","Scrambled, over easy, over hard, boiled, or egg whites"],correct:1},

  {id:4,question:"What comes in the Brunch Croissant?",options:["Scrambled egg, kosher-style bacon, fontina cheese, avocado, and chives","Scrambled egg, kosher-style bacon, mozzarella, avocado, and arugula","Sunny-side-up egg, kosher-style bacon, fontina cheese, avocado, and chives","Scrambled egg, turkey bacon, goat cheese, avocado, and chives"],correct:0},
  {id:5,question:"What bread is normally used in the Peter's Pan section?",options:["Gluten-free bread","Sourdough","Challah","Pita"],correct:1},
  {id:6,question:"Which Peter's Pan item includes kefir, feta cheese, arugula, zaatar, kalamata olives, red onions, cherry tomatoes, and olive oil?",options:["Greek Toast","Caprese Toast","Avocado Toast","Smoked Salmon Bagel"],correct:0},
  {id:7,question:"What are the recommended add-ons for the Avocado Toast?",options:["Egg, smoked salmon, and kosher-style bacon","Egg, tuna salad, and smoked salmon","Egg, goat cheese, and kosher-style bacon","Smoked salmon, feta, and avocado"],correct:0},
  {id:8,question:"What comes in the Smoked Salmon Bagel?",options:["Smoked salmon, kefir, capers, onions, and dill","Smoked salmon, cream cheese, capers, onions, and dill","Smoked salmon, kefir, cucumber, cherry tomatoes, and dill","Smoked salmon, goat cheese, capers, onions, and arugula"],correct:0},
  {id:9,question:"What is the correct description of the Grilled Salmon?",options:["Grilled salmon served with quinoa, arugula, avocado, sesame seeds, 2 eggs, sunflower seeds, and pumpkin seeds","Grilled salmon served with mixed greens, quinoa, kalamata olives, avocado, cherry tomatoes, and house dressing","Grilled salmon served with cucumber, corn, tomato, avocado, arugula, and lemon dressing","Grilled salmon served with mixed greens, spicy mayo, avocado, pumpkin seeds, red onion, cherry tomatoes, and sesame seeds"],correct:1},
  {id:10,question:"What comes in the Healthy Bowl?",options:["Quinoa, sunflower seeds, pumpkin seeds, smoked salmon, 2 eggs, arugula, avocado, and sesame seeds","Quinoa, smoked salmon, avocado, kalamata olives, cherry tomatoes, goat cheese, and house dressing","Mixed greens, smoked salmon, 2 eggs, avocado, pumpkin seeds, cherry tomatoes, and tahini","Quinoa, tuna salad, 2 eggs, avocado, arugula, pumpkin seeds, and sesame seeds"],correct:0},
  {id:11,question:"A customer has a nut allergy and asks which dressing is safest to choose. What is the best answer?",options:["Lemon dressing is the safest dressing option, but we still need to inform the kitchen because cross-contamination is possible","Pesto is safe because it is mostly basil and olive oil","Tahini is safe because it does not contain tree nuts","Any dressing is fine as long as the customer only has a mild allergy"],correct:0},
  {id:12,question:"What comes in the Captain Hook Chicken Salad?",options:["Chicken, avocado, tomato, cucumber, arugula, corn, and house dressing","Chicken, avocado, cherry tomatoes, quinoa, corn, feta, and house dressing","Chicken, cucumber, arugula, apple, pumpkin seeds, and tahini","Chicken, avocado, tomato, cucumber, mixed greens, corn, and pesto"],correct:0},
  {id:13,question:"What is the Perfect Pair Board?",options:["A board where the guest chooses 2 cheeses, 2 cured meats, and 2 sides","A board with brie, burrata, prosciutto, salami, olives, and pita","A board where the guest chooses 3 cheeses, 2 cured meats, and 1 side","A board with 2 cheeses, 1 cured meat, hummus, pita, and jam"],correct:0},
  {id:14,question:"What comes in the Secret Pita?",options:["Beef chorizo, sunny-side-up egg, tomato, cilantro, onion, and tahini","Arayes meat, sunny-side-up egg, tomato, cilantro, onion, and aioli","Beef chorizo, boiled egg, tomato, cilantro, onion, and tahini","Beef chorizo, sunny-side-up egg, avocado, tomato, onion, and tahini"],correct:0},
  {id:15,question:"What comes in the Challah Burger?",options:["Fontina cheese, avocado, egg, kosher-style bacon, and arayes meat","Mozzarella, avocado, egg, kosher-style bacon, and arayes meat","Fontina cheese, avocado, egg, beef chorizo, and arayes meat","Fontina cheese, tomato, egg, kosher-style bacon, and arayes meat"],correct:0},
  {id:16,question:"What comes in the Arayes Pixie Dust?",options:["Beef stuffed in crispy pita, served with tahini, olives, and pico","Beef stuffed in challah, served with aioli, olives, and pico","Beef chorizo in crispy pita, served with tahini, tomato, and cilantro","Arayes meat with pita, avocado, egg, tahini, and pico"],correct:0},
  {id:17,question:"Which pizzetta has kalamata olives, mozzarella, feta, red onions, and cherry tomatoes?",options:["Caprese Ponte","Santorini","Hawaiian Pizza","Mozzarella"],correct:1},

  {id:"A",text:"Sweet iced matcha with 100% organic matcha ice cubes"},

const MATCH_Q = [
  {id:21,item:"Neverland Iced Coffee",correct:"B"},
  {id:22,item:"Iced Matcha",correct:"A"},
  {id:23,item:"Lemonana",correct:"C"},
  {id:24,item:"Melted Brie Waffle",correct:"D"},

const SA_Q = [
  {id:26,scenario:'"I\'ve never been here before. What should I get?"',prompt:"Write a strong recommendation using one food item and one drink. Explain why and use confident guest-friendly language.",rubric:"Recommends one food item and one drink, explains why the items are good, uses confident guest-friendly language.",keywords:[["brunch croissant","avocado toast","truffle croissant","healthy bowl","acai","açaí","grilled salmon"],["iced coffee","matcha","latte","lemonade","lemonana","tiramisu"]]},

// ── SCORING ───────────────────────────────────────────────────────────────────
function scoreShortAnswer(answer,q){
  if(!answer||answer.trim().length<10)return 0;
  const lower=answer.toLowerCase();
  const matched=q.keywords.filter(g=>g.some(kw=>lower.includes(kw)));
  return matched.length>=Math.ceil(q.keywords.length*0.5)?1:0;
}
function gradeSubmission(answers){
  let score=0;const breakdown={};
  MC_Q.forEach(q=>{const a=answers[`q${q.id}`];const ok=a===q.correct;breakdown[`q${q.id}`]={answer:a,correct:ok,correctAnswer:q.correct};if(ok)score++;});
  MATCH_Q.forEach(q=>{const a=answers[`q${q.id}`];const ok=a===q.correct;breakdown[`q${q.id}`]={answer:a,correct:ok,correctAnswer:q.correct};if(ok)score++;});
  SA_Q.forEach(q=>{const a=answers[`q${q.id}`]||"";const auto=scoreShortAnswer(a,q);breakdown[`q${q.id}`]={answer:a,correct:auto===1,autoScore:auto,manualOverride:null};score+=auto;});
  return{score,breakdown};
}

function FlashcardsScreen({onBack}){

  const card=shuffled[idx];
  function next(){setFlipped(false);setTimeout(()=>setIdx(i=>(i+1)%shuffled.length),200);}

  return(

// ── PRACTICE QUESTIONS ────────────────────────────────────────────────────────
function PracticeScreen({onBack}){
  const [questions]=useState(()=>[...PRACTICE_Q].sort(()=>Math.random()-.5));
  const [idx,setIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [showResult,setShowResult]=useState(false);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const q=questions[idx];

  function choose(i){
    if(showResult)return;
    setSelected(i);setShowResult(true);
    if(i===q.correct)setScore(s=>s+1);
  }
  function next(){
    if(idx<questions.length-1){setIdx(i=>i+1);setSelected(null);setShowResult(false);}
    else setDone(true);
  }
  function restart(){setIdx(0);setSelected(null);setShowResult(false);setScore(0);setDone(false);}

  if(done){return(
    <div className="app">
      <BrandHeader onHome={onBack}/>
      <div className="card" style={{textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:12}}>✏️</div>
        <div className="section-title">Practice Complete!</div>
        <div className="result-score">{score}/{questions.length}</div>
        <div className="result-pct">{Math.round((score/questions.length)*100)}%</div>
        <p style={{fontSize:14,color:"var(--roast)",margin:"1rem 0"}}>This was practice mode — results are not saved. Keep studying and take the Official Test when ready!</p>
        <div className="nav-row">
          <button className="btn btn-secondary" onClick={restart}>Practice Again</button>
          <button className="btn btn-primary" onClick={onBack}>← Home</button>
        </div>
      </div>
    </div>
  );}

  return(
    <div className="app">
      <BrandHeader onHome={onBack}/>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
          <div className="section-title" style={{margin:0}}>✏️ Practice</div>
          <button className="btn btn-secondary" style={{fontSize:12,padding:"7px 14px"}} onClick={onBack}>← Home</button>
        </div>
        <div className="progress-bar-wrap"><div className="progress-bar-fill" style={{width:`${((idx+1)/questions.length)*100}%`}}/></div>
        <div className="progress-label" style={{marginBottom:"1rem"}}>Question {idx+1} of {questions.length} · Score: {score}</div>
        <div style={{background:"#FFF8F0",borderRadius:10,padding:6,marginBottom:8,fontSize:11,color:"var(--caramel)",fontWeight:700,textAlign:"center",textTransform:"uppercase",letterSpacing:1}}>Practice Mode — Not Saved</div>
        <div className="q-text">{q.q}</div>
        {q.options.map((opt,i)=>{
          let cls="option-btn";
          if(showResult){if(i===q.correct)cls+=" correct";else if(i===selected&&i!==q.correct)cls+=" incorrect";}
          else if(selected===i)cls+=" selected";
          return(
            <button key={i} className={cls} onClick={()=>choose(i)} disabled={showResult}>
              <span className="option-letter">{String.fromCharCode(65+i)}</span>{opt}
            </button>
          );
        })}
        {showResult&&(
          <div className={`practice-result ${selected===q.correct?"practice-correct":"practice-incorrect"}`}>
            <strong>{selected===q.correct?"✓ Correct!":"✗ Incorrect"}</strong> — {q.explain}
          </div>
        )}
        {showResult&&(
          <button className="btn btn-primary btn-full" style={{marginTop:"1rem"}} onClick={next}>
            {idx<questions.length-1?"Next Question →":"See Results"}
          </button>
        )}
      </div>
    </div>
  );
}

// ── TEST ──────────────────────────────────────────────────────────────────────
function TestScreen({employee,onSubmit,onBack}){
  const [cur,setCur]=useState(0);
  const [answers,setAnswers]=useState({});
  const [review,setReview]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const [submitted,setSubmitted]=useState(false);

  const allIds=[...MC_Q,...MATCH_Q,...SA_Q].map(q=>`q${q.id}`);
  const answered=allIds.filter(id=>answers[id]!==undefined&&answers[id]!=="").length;

  function setAns(k,v){setAnswers(p=>({...p,[k]:v}));}
  function getQ(i){if(i<20)return{q:MC_Q[i],type:"mc"};if(i<25)return{q:MATCH_Q[i-20],type:"match"};return{q:SA_Q[i-25],type:"short"};}
  function secLabel(i){if(i<20)return"Section A — Multiple Choice";if(i<25)return"Section B — Matching";return"Section C — Customer Service";}

  const {q,type}=getQ(cur);
  const qk=`q${q.id}`;
  const curAns=answers[qk];

  async function doSubmit(){
    if(submitted)return;
    setSubmitted(true);setSubmitting(true);
    await onSubmit(answers);
  }

  if(review){
    const secs=[
      {label:"Section A — Multiple Choice (1–20)",items:MC_Q.map(q=>({id:q.id,disp:`Q${q.id}: ${q.question.slice(0,55)}…`,ans:answers[`q${q.id}`]!==undefined?`Option ${String.fromCharCode(65+answers[`q${q.id}`])}`:null}))},
      {label:"Section B — Matching (21–25)",items:MATCH_Q.map(q=>({id:q.id,disp:`Q${q.id}: ${q.item}`,ans:answers[`q${q.id}`]?`Option ${answers[`q${q.id}`]}`:null}))},
      {label:"Section C — Short Answer (26–30)",items:SA_Q.map(q=>{const a=answers[`q${q.id}`];return{id:q.id,disp:`Q${q.id}: ${q.scenario.slice(0,50)}…`,ans:a?`${a.slice(0,40)}${a.length>40?"…":""}`:null};})},
    ];
    return(
      <div className="app">
        <BrandHeader/>
        <div className="card">
          <div className="section-title">Review Your Answers</div>
          {answered<30&&<div style={{background:"#FDECEA",borderRadius:8,padding:"10px 14px",fontSize:13,color:"var(--err)",marginBottom:"1rem"}}>⚠ {30-answered} question(s) still unanswered — please go back and complete them before submitting.</div>}
          {secs.map(sec=>(
            <div key={sec.label}>
              <div style={{fontWeight:700,fontSize:12,textTransform:"uppercase",letterSpacing:1,color:"var(--caramel)",margin:"1rem 0 6px"}}>{sec.label}</div>
              {sec.items.map(item=>(
                <div key={item.id} className="review-item">
                  <div className="review-q">{item.disp}</div>
                  <div className="review-a" style={{color:item.ans?"var(--espresso)":"var(--err)",fontStyle:item.ans?"normal":"italic"}}>{item.ans||"Not answered"}</div>
                </div>
              ))}
            </div>
          ))}
          <div className="nav-row" style={{marginTop:"1.5rem"}}>
            <button className="btn btn-secondary" onClick={()=>setReview(false)}>← Back to Test</button>
            <button className="btn btn-primary" onClick={doSubmit} disabled={submitting||answered<30||submitted}>{submitting?"Submitting…":"Submit Test ✓"}</button>
          </div>
          {answered<30&&<p style={{textAlign:"center",fontSize:12,color:"var(--err)",marginTop:10}}>Answer all {30-answered} remaining questions first.</p>}
        </div>
      </div>
    );
  }

  return(
    <div className="app">
      <BrandHeader/>
      <div className="card">
        <div className="progress-bar-wrap"><div className="progress-bar-fill" style={{width:`${((cur+1)/TOTAL_Q)*100}%`}}/></div>
        <div className="progress-label" style={{marginBottom:"0.75rem"}}>Question {cur+1} of {TOTAL_Q}</div>
        <div className="q-section-badge">{secLabel(cur)}</div>
        <div className="q-number">Question {q.id} of {TOTAL_Q}</div>

        {type==="mc"&&(<>
          <div className="q-text">{q.question}</div>
          {q.options.map((opt,i)=>(
            <button key={i} className={`option-btn ${curAns===i?"selected":""}`} onClick={()=>setAns(qk,i)}>
              <span className="option-letter">{String.fromCharCode(65+i)}</span>{opt}
            </button>
          ))}
        </>)}

        {type==="match"&&(<>
          <div className="q-text">Match the item to its correct description.</div>
          <div style={{background:"var(--foam)",borderRadius:10,padding:"12px 14px",marginBottom:"1rem"}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:"var(--roast)"}}>Descriptions:</div>
            {MATCH_OPTS.map(opt=>(
              <div key={opt.id} style={{fontSize:13,marginBottom:6,display:"flex",gap:8}}>
                <span style={{fontWeight:700,color:"var(--caramel)",minWidth:16}}>{opt.id}.</span>
                <span>{opt.text}</span>
              </div>
            ))}
          </div>
          <div className="match-row">
            <div className="match-item">{q.item}</div>
            <select style={{flex:1}} value={curAns||""} onChange={e=>setAns(qk,e.target.value||undefined)}>
              <option value="">Select description…</option>
              {MATCH_OPTS.map(opt=><option key={opt.id} value={opt.id}>{opt.id} — {opt.text.slice(0,45)}…</option>)}
            </select>
          </div>
        </>)}

        {type==="short"&&(<>
          <div className="q-scenario">{q.scenario}</div>
          <div className="q-text" style={{fontSize:15}}>{q.prompt}</div>
          <textarea placeholder="Type your response here…" value={curAns||""} onChange={e=>setAns(qk,e.target.value)} rows={5}/>
        </>)}

        <div className="nav-row">
          <button className="btn btn-secondary" onClick={()=>setCur(c=>c-1)} disabled={cur===0}>← Back</button>
          <button className="btn btn-primary" onClick={()=>cur===TOTAL_Q-1?setReview(true):setCur(c=>c+1)}>
            {cur===TOTAL_Q-1?"Review Answers →":"Next →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN DASHBOARD ───────────────────────────────────────────────────────────
function AdminDashboard({submissions,onUpdateScore,onDeleteSubmission,onAddNote,onMarkReviewed,onBack}){
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [posFilter,setPosFilter]=useState("all");
  const [detail,setDetail]=useState(null);

  const filtered=submissions.filter(s=>{
    const nm=s.employeeName.toLowerCase().includes(search.toLowerCase());
    const fl=filter==="all"||(filter==="passed"&&s.score>=PASSING_SCORE)||(filter==="failed"&&s.score<PASSING_SCORE);
    const pf=posFilter==="all"||s.position===posFilter;
    return nm&&fl&&pf;
  });

  function exportCSV(){
    const hdr=["Name","Position","Date","Score","Percentage","Result","Reviewed",...Array.from({length:30},(_,i)=>`Q${i+1}`),...Array.from({length:30},(_,i)=>`Q${i+1}_Correct`),"Admin_Notes"];
    const rows=submissions.map(s=>{
      const pct=Math.round((s.score/30)*100);
      const base=[s.employeeName,s.position||"",new Date(s.submittedAt).toLocaleString(),s.score,`${pct}%`,s.score>=PASSING_SCORE?"Passed":"Did Not Pass",s.adminReviewed?"Yes":"No"];
      const ac=Array.from({length:30},(_,i)=>{const b=s.breakdown[`q${i+1}`];if(!b)return"";if(i<20)return b.answer!==undefined?String.fromCharCode(65+b.answer):"";return b.answer||"";});
      const cc=Array.from({length:30},(_,i)=>{const b=s.breakdown[`q${i+1}`];return b?(b.correct?"Correct":"Incorrect"):"";});
      return[...base,...ac,...cc,s.adminNotes||""];
    });
    const csv=[hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="neverland_results.csv";a.click();URL.revokeObjectURL(url);
  }

  const totalPassed=submissions.filter(s=>s.score>=PASSING_SCORE).length;
  const avg=submissions.length?Math.round(submissions.reduce((a,s)=>a+s.score,0)/submissions.length):0;

  return(
    <div className="app">
      <BrandHeader onHome={onBack}/>
      {detail&&(
        <AdminDetailModal
          s={detail}
          onClose={()=>setDetail(null)}
          onUpdateScore={(id,qId,score)=>{onUpdateScore(id,qId,score);setDetail(d=>d?{...submissions.find(s=>s.id===d.id)||d}:null);}}
          onAddNote={(id,note)=>{onAddNote(id,note);}}
          onMarkReviewed={(id)=>{onMarkReviewed(id);}}
        />
      )}
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:8}}>
          <div className="section-title" style={{margin:0}}>Admin Dashboard</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button className="btn btn-secondary" style={{fontSize:12,padding:"8px 12px"}} onClick={exportCSV}>Export CSV</button>
            <button className="btn btn-secondary" style={{fontSize:12,padding:"8px 12px"}} onClick={onBack}>← Exit</button>
          </div>
        </div>

        <div className="stat-row">
          <div className="stat-card"><div className="stat-num">{submissions.length}</div><div className="stat-lbl">Total</div></div>
          <div className="stat-card"><div className="stat-num" style={{color:"var(--pass)"}}>{totalPassed}</div><div className="stat-lbl">Passed</div></div>
          <div className="stat-card"><div className="stat-num">{avg}/30</div><div className="stat-lbl">Avg Score</div></div>
        </div>

        <div className="search-row">
          <input type="text" placeholder="Search by name…" value={search} onChange={e=>setSearch(e.target.value)}/>
          <select value={filter} onChange={e=>setFilter(e.target.value)}>
            <option value="all">All Results</option>
            <option value="passed">Passed Only</option>
            <option value="failed">Did Not Pass</option>
          </select>
          <select value={posFilter} onChange={e=>setPosFilter(e.target.value)} style={{width:120}}>
            <option value="all">All Positions</option>
            {POSITIONS.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        </div>

        {submissions.length===0&&(
          <div className="state-box">
            <div className="state-icon">📋</div>
            <div className="state-text">No employee submissions yet.</div>
            <div className="state-sub">Results will appear here once employees complete the official test.</div>
          </div>
        )}
        {submissions.length>0&&filtered.length===0&&(
          <div className="state-box">
            <div className="state-icon">🔍</div>
            <div className="state-text">No results match your search.</div>
            <div className="state-sub">Try adjusting your filters.</div>
          </div>
        )}

        {filtered.length>0&&(
          <div style={{overflowX:"auto"}}>
            <table className="admin-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Position</th>
                  <th>Date</th>
                  <th>Score</th>
                  <th>Result</th>
                  <th>Reviewed</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(s=>{
                  const pct=Math.round((s.score/30)*100);
                  const passed=s.score>=PASSING_SCORE;
                  return(
                    <tr key={s.id}>
                      <td style={{fontWeight:700}}>{s.employeeName}</td>
                      <td style={{fontSize:12}}>{s.position||"—"}</td>
                      <td style={{whiteSpace:"nowrap",fontSize:11,color:"var(--roast)"}}>{new Date(s.submittedAt).toLocaleString()}</td>
                      <td style={{fontWeight:700}}>{s.score}/30<br/><span style={{fontSize:11,fontWeight:400,color:"var(--roast)"}}>{pct}%</span></td>
                      <td><span className={`tag ${passed?"tag-pass":"tag-fail"}`}>{passed?"Passed":"Not Passed"}</span></td>
                      <td><span className={`tag ${s.adminReviewed?"tag-correct":"tag-review"}`}>{s.adminReviewed?"✓ Yes":"Pending"}</span></td>
                      <td>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                          <button className="btn btn-secondary" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>setDetail(s)}>View Details</button>
                          <button className="btn btn-danger" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>{if(window.confirm(`Delete ${s.employeeName}'s submission? This cannot be undone.`))onDeleteSubmission(s.id);}}>Delete</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("home");
  const [employee,setEmployee]=useState(null);
  const [lastResult,setLastResult]=useState(null);
  const [submissions,setSubmissions]=useState([]);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    const subs=loadSubs();
    setSubmissions(subs);
    setLoaded(true);
  },[]);

  function nav(s){setScreen(s);}

  function handleTestStart(name,pos){
    setEmployee({name,pos});
    setScreen("test");
  }

  function handleSubmit(answers){
    return new Promise(resolve=>{
      const {score,breakdown}=gradeSubmission(answers);
      const result={
        id:`${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
        employeeName:employee.name,
        position:employee.pos||"",
        submittedAt:new Date().toISOString(),
        score,
        breakdown,
        adminReviewed:false,
        adminNotes:"",
      };
      const updated=[result,...submissions];
      setSubmissions(updated);
      saveSubs(updated);
      setLastResult(result);
      setScreen("result");
      resolve();
    });
  }

  function handleUpdateScore(subId,qId,newScore){
    const updated=submissions.map(s=>{
      if(s.id!==subId)return s;
      const nb={...s.breakdown,[qId]:{...s.breakdown[qId],manualOverride:newScore,correct:newScore===1}};
      let total=0;
      Object.values(nb).forEach(b=>{const e=b.manualOverride!=null?b.manualOverride:(b.correct?1:0);total+=e;});
      return{...s,breakdown:nb,score:total};
    });
    setSubmissions(updated);
    saveSubs(updated);
  }

  function handleAddNote(subId,note){
    const updated=submissions.map(s=>s.id===subId?{...s,adminNotes:note}:s);
    setSubmissions(updated);
    saveSubs(updated);
  }

  function handleMarkReviewed(subId){
    const updated=submissions.map(s=>s.id===subId?{...s,adminReviewed:!s.adminReviewed}:s);
    setSubmissions(updated);
    saveSubs(updated);
  }

  function handleDelete(id){
    const updated=submissions.filter(s=>s.id!==id);
    setSubmissions(updated);
    saveSubs(updated);
  }

  if(!loaded)return(
    <div className="app" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"60vh"}}>
      <div style={{textAlign:"center",color:"var(--roast)"}}>
        <div style={{fontSize:40,marginBottom:12}}>☕</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:18}}>Loading…</div>
      </div>
    </div>
  );

  if(screen==="home")return <HomeScreen onNav={nav}/>;
  if(screen==="study")return <StudyCenter onBack={()=>nav("home")} onNav={nav}/>;
  if(screen==="flashcards")return <FlashcardsScreen onBack={()=>nav("home")}/>;
  if(screen==="practice")return <PracticeScreen onBack={()=>nav("home")}/>;
  if(screen==="test-start")return <TestStartScreen onStart={handleTestStart} onBack={()=>nav("home")}/>;
  if(screen==="test")return <TestScreen employee={employee} onSubmit={handleSubmit} onBack={()=>nav("home")}/>;
  if(screen==="result")return <ResultScreen result={lastResult} onHome={()=>nav("home")}/>;
  if(screen==="admin-login")return <AdminLoginScreen onLogin={()=>nav("admin")} onBack={()=>nav("home")}/>;
  if(screen==="admin")return(
    <AdminDashboard
      submissions={submissions}
      onUpdateScore={handleUpdateScore}
      onDeleteSubmission={handleDelete}
      onAddNote={handleAddNote}
      onMarkReviewed={handleMarkReviewed}
      onBack={()=>nav("home")}
    />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
