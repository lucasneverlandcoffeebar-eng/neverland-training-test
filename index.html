<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Neverland Coffee Bar — Employee Training</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--espresso:#2C1810;--roast:#4A2C1A;--caramel:#C8860A;--latte:#D4A96A;--cream:#F5ECD7;--foam:#FBF6EE;--milk:#fff;--err:#C0392B;--pass:#27AE60;--border:rgba(44,24,16,0.15);--shadow:0 2px 12px rgba(44,24,16,0.08)}
body{font-family:'Lato',sans-serif;background:var(--foam);color:var(--espresso);min-height:100vh}
.app{max-width:700px;margin:0 auto;padding:1rem;min-height:100vh}
.brand-header{text-align:center;padding:2rem 1rem 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.brand-logo{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--caramel);font-weight:700;margin-bottom:.5rem}
.brand-title{font-family:'Playfair Display',serif;font-size:clamp(18px,4vw,26px);font-weight:700;color:var(--espresso);line-height:1.2}
.brand-sub{font-size:13px;color:var(--roast);opacity:.7;margin-top:6px;letter-spacing:1px}
.card{background:var(--milk);border-radius:16px;border:1px solid var(--border);padding:1.5rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 24px;border-radius:10px;font-family:'Lato',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:transform .1s,opacity .1s;letter-spacing:.5px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--caramel);color:white}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--cream);color:var(--espresso);border:1px solid var(--border)}
.btn-secondary:hover{background:#EDE0C8}
.btn-danger{background:var(--err);color:white}
.btn-green{background:var(--pass);color:white}
.btn-full{width:100%}
.btn:disabled{opacity:.45;cursor:not-allowed}
label{display:block;font-size:13px;font-weight:700;color:var(--roast);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
input[type="text"],input[type="password"],select,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--foam);font-family:'Lato',sans-serif;font-size:15px;color:var(--espresso);outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--caramel);background:var(--milk)}
textarea{resize:vertical;min-height:90px}
.progress-bar-wrap{background:var(--cream);border-radius:99px;height:7px;overflow:hidden;margin-bottom:6px}
.progress-bar-fill{height:100%;background:var(--caramel);border-radius:99px;transition:width .4s ease}
.progress-label{font-size:12px;color:var(--roast);opacity:.7;text-align:right}
.q-section-badge{display:inline-block;padding:3px 12px;border-radius:99px;background:var(--cream);color:var(--caramel);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem}
.q-number{font-size:12px;color:var(--roast);opacity:.6;margin-bottom:4px}
.q-text{font-family:'Playfair Display',serif;font-size:17px;color:var(--espresso);line-height:1.5;margin-bottom:1.25rem}
.q-scenario{background:var(--cream);border-left:3px solid var(--caramel);border-radius:0 8px 8px 0;padding:10px 14px;font-style:italic;font-size:15px;margin-bottom:1rem;color:var(--roast)}
.option-btn{display:block;width:100%;text-align:left;padding:12px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--foam);font-family:'Lato',sans-serif;font-size:14px;color:var(--espresso);cursor:pointer;transition:all .15s;margin-bottom:8px;line-height:1.4}
.option-btn:hover{border-color:var(--caramel);background:var(--cream)}
.option-btn.selected{border-color:var(--caramel);background:#FFF3DC;font-weight:700}
.option-btn.correct{border-color:var(--pass);background:#D5F5E3}
.option-btn.incorrect{border-color:var(--err);background:#FDECEA}
.option-letter{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--cream);color:var(--caramel);font-weight:700;font-size:12px;text-align:center;line-height:22px;margin-right:10px;flex-shrink:0}
.option-btn.selected .option-letter{background:var(--caramel);color:white}
.option-btn.correct .option-letter{background:var(--pass);color:white}
.option-btn.incorrect .option-letter{background:var(--err);color:white}
.match-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.match-item{font-weight:700;font-size:14px;min-width:160px}
.nav-row{display:flex;gap:10px;margin-top:1.5rem}
.nav-row .btn{flex:1}
.result-score{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;color:var(--espresso);text-align:center}
.result-pct{font-size:22px;color:var(--caramel);text-align:center;margin-bottom:8px}
.result-badge{display:inline-block;padding:6px 20px;border-radius:99px;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase}
.badge-pass{background:#D5F5E3;color:var(--pass)}
.badge-fail{background:#FDECEA;color:var(--err)}
.review-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}
.review-q{font-size:13px;flex:1}
.review-a{font-size:13px;max-width:200px;text-align:right}
.tag{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.tag-pass{background:#D5F5E3;color:var(--pass)}
.tag-fail{background:#FDECEA;color:var(--err)}
.tag-correct{background:#D5F5E3;color:var(--pass)}
.tag-incorrect{background:#FDECEA;color:var(--err)}
.tag-review{background:#FFF3CD;color:#856404}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--cream);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--espresso)}
.stat-lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--roast);opacity:.7;margin-top:2px}
.section-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:1rem;color:var(--espresso)}
.section-sub{font-size:13px;color:var(--roast);opacity:.8;margin-bottom:1.5rem;line-height:1.6}
.search-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.search-row input{flex:1;min-width:140px}
.search-row select{width:140px}
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{background:var(--cream);padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--roast);border-bottom:1px solid var(--border)}
.admin-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.admin-table tr:hover td{background:var(--foam)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.detail-cell{background:var(--foam);border-radius:8px;padding:10px}
.detail-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--roast);opacity:.7;margin-bottom:2px}
.detail-val{font-size:14px;font-weight:700;color:var(--espresso)}
.q-detail-row{padding:10px 0;border-bottom:1px solid var(--border)}
.q-detail-text{font-size:13px;color:var(--espresso);margin-bottom:4px}
.q-detail-sa{background:var(--foam);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--espresso);margin:6px 0;font-style:italic;line-height:1.5}
.override-row{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.override-row select{width:auto;padding:6px 10px;font-size:13px}
/* Home screen menu buttons */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:1.5rem}
.home-btn{background:var(--milk);border:1.5px solid var(--border);border-radius:14px;padding:1.25rem 1rem;cursor:pointer;text-align:center;transition:all .15s;box-shadow:var(--shadow)}
.home-btn:hover{border-color:var(--caramel);background:var(--cream);transform:translateY(-2px)}
.home-btn-icon{font-size:28px;margin-bottom:8px}
.home-btn-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--espresso);margin-bottom:4px}
.home-btn-sub{font-size:12px;color:var(--roast);opacity:.7}
/* Study center */
.study-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem}
.study-nav-btn{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--foam);color:var(--roast);transition:all .15s}
.study-nav-btn.active{background:var(--caramel);color:white;border-color:var(--caramel)}
.study-nav-btn:hover{border-color:var(--caramel)}
.study-section{margin-bottom:1.5rem}
.study-section h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--espresso);margin-bottom:0.75rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem}
.study-section p{font-size:14px;color:var(--roast);line-height:1.7;margin-bottom:0.75rem}
.study-section ul{padding-left:1.25rem;margin-bottom:0.75rem}
.study-section li{font-size:14px;color:var(--roast);line-height:1.8}
.study-callout{background:var(--cream);border-left:3px solid var(--caramel);border-radius:0 8px 8px 0;padding:12px 16px;margin:1rem 0;font-size:14px;color:var(--espresso);line-height:1.6;font-style:italic}
.menu-category{background:var(--foam);border-radius:12px;border:1px solid var(--border);padding:1rem;margin-bottom:10px}
.menu-category-title{font-weight:700;font-size:14px;color:var(--espresso);margin-bottom:6px}
.menu-category-desc{font-size:13px;color:var(--roast);margin-bottom:8px;line-height:1.5}
.menu-items{display:flex;flex-wrap:wrap;gap:5px}
.menu-tag{background:var(--cream);border-radius:99px;padding:3px 10px;font-size:12px;color:var(--roast);font-weight:700}
/* Flashcards */
.flashcard-wrap{perspective:1000px;width:100%;margin-bottom:1rem}
.flashcard{width:100%;min-height:160px;border-radius:16px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .5s;box-shadow:var(--shadow)}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;width:100%;min-height:160px;border-radius:16px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center}
.flashcard-front{background:var(--milk);border:1.5px solid var(--border)}
.flashcard-back{background:var(--caramel);color:white;transform:rotateY(180deg)}
.flashcard-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;opacity:.6;margin-bottom:8px}
.flashcard-text{font-family:'Playfair Display',serif;font-size:16px;line-height:1.5;font-weight:600}
.flashcard-back .flashcard-label{color:rgba(255,255,255,0.7)}
.flashcard-back .flashcard-text{color:white}
.fc-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:1rem}
.fc-counter{font-size:13px;color:var(--roast);opacity:.7}
/* Practice */
.practice-result{border-radius:10px;padding:12px 16px;margin-top:12px;font-size:14px;line-height:1.5}
.practice-correct{background:#D5F5E3;color:var(--pass);border:1px solid #A9DFBF}
.practice-incorrect{background:#FDECEA;color:var(--err);border:1px solid #F5B7B1}
/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(44,24,16,0.5);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:1rem;overflow-y:auto}
.modal-box{background:var(--milk);border-radius:16px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(44,24,16,0.2);margin:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--milk);z-index:1}
.modal-body{padding:1.5rem}
.modal-close{background:var(--cream);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--espresso)}
/* Rec cards */
.rec-group{margin-bottom:1.25rem}
.rec-group-title{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--caramel);margin-bottom:8px}
.rec-items{display:flex;flex-wrap:wrap;gap:6px}
.rec-item{background:var(--cream);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--espresso);font-weight:600}
/* Admin notes */
.notes-area{width:100%;min-height:70px;font-size:13px;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:var(--foam);font-family:'Lato',sans-serif;resize:vertical}
/* Loading / empty states */
.state-box{text-align:center;padding:2.5rem 1rem;color:var(--roast)}
.state-icon{font-size:36px;margin-bottom:12px}
.state-text{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--espresso)}
.state-sub{font-size:13px;opacity:.7}
@media(max-width:480px){
  .detail-grid{grid-template-columns:1fr}
  .match-row{flex-direction:column;align-items:stretch}
  .match-item{min-width:unset}
  .admin-table{display:block;overflow-x:auto}
  .nav-row{flex-direction:column}
  .search-row select{width:100%}
  .home-grid{grid-template-columns:1fr}
  .stat-row{grid-template-columns:repeat(3,1fr);gap:6px}
  .stat-num{font-size:22px}
}

</style>
</head>
